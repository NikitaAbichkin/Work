services:
  postgres:
    image: postgres
    container_name: DB_users
    environment:
      POSTGRES_DB: jwt_auth
      POSTGRES_USER: nikita
      POSTGRES_PASSWORD: nikita
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jwt_auth
      SPRING_DATASOURCE_USERNAME: nikita
      SPRING_DATASOURCE_PASSWORD: nikita
      CORS_ALLOWED_ORIGINS: http://10.3.25.112:8080